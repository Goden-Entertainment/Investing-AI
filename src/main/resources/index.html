<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Homepage</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="text">
    <h1>AI Project</h1>
</div>

<div id="main">
    <!--Dropdown and search on left-->
    <div id="searchDropdown">
        <div>
            <input type="text" id="search" placeholder="Search...">
            <button id="searchButton">Search</button>
        </div>
    </div>

    <!--chat on right-->
    <div id="chat">
        <h2>Chat</h2>
        <div id="messages"></div>
        <form id="chatForm">
            <input id="userInput" type="text" placeholder="Write question here...">
            <button type="submit">Ask</button>
        </form>
    </div>
</div>
</body>
</html>
