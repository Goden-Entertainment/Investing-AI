<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Homepage</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="js/main.js"></script>

</head>
<body>
<h1>Yacqub´s Investeringsguide</h1>
<div id="columns">
<!--search on left-->
<div>
    <input type="text" id="search" placeholder="Search...">
    <button id="searchButton">Search</button>
</div>

    <!--chat on right-->
    <div id="chat">
        <h2>Chat</h2>
        <div id="messages"></div>
        <form id="chatForm">
            <input id="userInput" type="text" placeholder="Write question here...">
            <button type="submit">Ask</button>
        </form>
        <div id="loading1" class="spinner-border text-success" role="status"
             style="margin-left:1em; border-radius: 50%; display:none;">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p id="result"></p>
    </div>
<!--stocks middle -->
<div id="stocks"></div>

<!--chat on right-->
<div id="chat">
    <button id="clearChat">New Chat</button>
    <h2>Chat</h2>
    <div id="messages"></div>
    <div>
        <button class="suggestion">Where to invest now?</button>
        <button class="suggestion">Biggest investment mistakes.</button>
        <button class="suggestion">Low risk options?</button>
    </div>
    <form>
        <input id="userInput" type="text" placeholder="Write questions here...">
        <button type="submit">Ask</button>
    </form>
</div>
</div>
<script src="/js/main.js" defer></script>
</body>
</html>
