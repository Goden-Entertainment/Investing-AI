<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Homepage</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="js/main.js"></script>

</head>
<body>

<div id="text">
    <h1>AI Project</h1>
</div>

<div id="main">
    <!--Dropdown and search on left-->
    <div id="searchDropdown">
        <div>
            <input type="text" id="search" placeholder="Search...">
            <button id="searchButton">Search</button>
        </div>
    </div>

    <!--chat on right-->
    <div id="chat">
        <h2>Chat</h2>
        <div id="messages"></div>
        <form id="chatForm">
            <input id="userInput" type="text" placeholder="Write question here...">
            <button type="submit">Ask</button>
        </form>
        <div id="loading1" class="spinner-border text-success" role="status"
             style="margin-left:1em; border-radius: 50%; display:none;">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p id="result"></p>
    </div>
</div>
</body>
</html>
